# Use tmux-256color for modern, italic, and 256-color support
set -g default-terminal "tmux-256color"
# Enable true color (24-bit) support (the "Tc" capability)
set -as terminal-overrides ",tmux*:Tc"
# set -ag terminal-features ",tmux*:RGB"

# use C-a, since it's on the home row and easier to hit than C-b
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix
set -g base-index 1

# Easy config reload
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# vi is good
setw -g mode-keys vi

# mouse behavior
set -g mouse on

bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history

bind-key space next-window
bind-key bspace previous-window
bind-key enter next-layout

# use vim-like keys for splits and windows
bind-key v split-window -h
bind-key s split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind C-l send-keys 'C-l'

bind-key C-o rotate-window

bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical
set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80

bind-key a last-pane
bind-key q display-panes
bind-key c new-window
bind-key t next-window
bind-key T previous-window

bind-key [ copy-mode
bind-key ] paste-buffer

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Update default binding of `Enter` to also use copy-pipe
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

set-window-option -g display-panes-time 1500

# Status Bar
set-option -g status-interval 1
set-option -g status-left ''
set-option -g status-right '%l:%M%p'
set-window-option -g window-status-current-style fg=magenta

# Automatically name each window after its current directory.
# Append ":<command>" when the foreground process isn't the shell (zsh/bash).
# Claude Code reports itself as its version (e.g. 2.1.159); any version-like
# X.Y.Z command name is shown as "claude" instead of the raw number.
# allow-rename off stops apps/oh-my-zsh title escapes from overriding this.
set-option -g allow-rename off
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}#{?#{||:#{==:#{pane_current_command},zsh},#{==:#{pane_current_command},bash}},,:#{?#{m:*.*.*,#{pane_current_command}},claude,#{pane_current_command}}}'

# Status Bar solarized-dark (default)
set-option -g status-style fg=default,bg=black
set-option -g pane-active-border-style fg=black
set-option -g pane-border-style fg=black

# Status Bar solarized-light
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g status-style fg=default,bg=white"
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g pane-active-border-style fg=white"
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g pane-border-style fg=white"

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

# Increase history scrollback
set -g history-limit 10000

# Native macOS copy and paste using pbcopy/pbpaste
bind C-S-v run-shell "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"
bind C-S-c run-shell "tmux show-buffer | pbcopy"

# Allow the arrow key to be used immediately after changing windows
set-option -g repeat-time 0

# Enable focus reporting for claude code cli
# https://code.claude.com/docs/en/terminal-config#configure-tmux
set -g focus-events on
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# extended-keys mode 2 (requested by Claude Code) re-encodes C-[ as a CSI-u
# sequence, which breaks C-[ as an Escape alias in vim mode. Re-send raw ESC.
# 1b = ASCII 0x1b (ESC); -H sends it as a literal byte, bypassing re-encoding.
bind-key -n 'C-[' send-keys -H 1b
